<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#1a5c2a">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121812">
<title>Recolección por dirección — Río Tercero</title>
<link rel="stylesheet" href="style.css">
<style>
body { padding-bottom: 4rem; }
form { display: flex; gap: .5rem; }
form input { flex: 1; }
form button { white-space: nowrap; }
#result { margin-top: 1.5rem; }
#result .error { color: var(--muted); font-style: italic; }
#result .suggestions { margin: .75rem 0; }
#result .suggestions li { cursor: pointer; color: var(--accent); }
#result .suggestions li:hover { text-decoration: underline; }
.coords { font-size: .85em; color: var(--muted); }
.spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin-right: .5rem; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.back-link { display: inline-block; margin-top: 1.5rem; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📍 Recolección por dirección</h1>
    <p>Ingresá una dirección para saber en qué área estás</p>
  </header>

  <form id="geoForm">
    <input type="text" id="addressInput" placeholder="Ej: 25 de Mayo 912" autocomplete="off" required>
    <button type="submit">Buscar</button>
  </form>

  <div id="result"></div>

  <a href="index.html" class="back-link">← Buscar por barrio</a>
</div>

<script src="location.js"></script>
</body>
</html>
